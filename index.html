<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Finance Dashboard</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f4f6f9;
    }

    header {
      background: #4CAF50;
      color: white;
      padding: 15px;
      display: flex;
      justify-content: space-between;
    }

    .container {
      padding: 20px;
    }

    .cards {
      display: flex;
      gap: 20px;
      margin-bottom: 20px;
    }

    .card {
      background: white;
      padding: 15px;
      flex: 1;
      border-radius: 10px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    table {
      width: 100%;
      background: white;
      border-collapse: collapse;
      margin-top: 20px;
    }

    th, td {
      padding: 10px;
      border-bottom: 1px solid #ddd;
      text-align: left;
    }

    button {
      padding: 6px 10px;
      border: none;
      background: #4CAF50;
      color: white;
      cursor: pointer;
      border-radius: 5px;
      margin-right: 5px;
    }

    .delete-btn {
      background: #e74c3c;
    }

    input, select {
      padding: 8px;
      margin: 5px;
    }

    .hidden {
      display: none;
    }

    .insights {
      background: white;
      padding: 15px;
      margin-top: 20px;
      border-radius: 10px;
    }
  </style>
</head>
<body>

<header>
  <h2>Finance Dashboard</h2>
  <div>
    Role:
    <select id="role">
      <option value="viewer">Viewer</option>
      <option value="admin">Admin</option>
    </select>
  </div>
</header>

<div class="container">

  <!-- Summary -->
  <div class="cards">
    <div class="card">
      <h3>Total Balance</h3>
      <p id="balance">0</p>
    </div>
    <div class="card">
      <h3>Income</h3>
      <p id="income">0</p>
    </div>
    <div class="card">
      <h3>Expenses</h3>
      <p id="expense">0</p>
    </div>
  </div>

  <!-- Add/Edit Transaction -->
  <div id="adminSection" class="hidden">
    <h3 id="formTitle">Add Transaction</h3>
    <input type="text" id="category" placeholder="Category">
    <input type="number" id="amount" placeholder="Amount">
    <select id="type">
      <option value="income">Income</option>
      <option value="expense">Expense</option>
    </select>
    <button onclick="saveTransaction()">Save</button>
    <button onclick="resetForm()">Cancel</button>
  </div>

  <!-- Filters -->
  <div>
    <input type="text" id="search" placeholder="Search Category" onkeyup="render()">
    <select id="filter" onchange="render()">
      <option value="all">All</option>
      <option value="income">Income</option>
      <option value="expense">Expense</option>
    </select>
  </div>

  <!-- Transactions Table -->
  <table>
    <thead>
      <tr>
        <th>Date</th>
        <th>Category</th>
        <th>Amount</th>
        <th>Type</th>
        <th id="actionHeader" class="hidden">Actions</th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>

  <!-- Insights -->
  <div class="insights">
    <h3>Insights</h3>
    <p id="insightText"></p>
  </div>

</div>

<script>
  let transactions = [
    { date: "2026-04-01", category: "Salary", amount: 5000, type: "income" },
    { date: "2026-04-02", category: "Food", amount: 200, type: "expense" },
    { date: "2026-04-03", category: "Shopping", amount: 500, type: "expense" }
  ];

  let editIndex = null;

  const roleSelect = document.getElementById("role");

  roleSelect.addEventListener("change", () => {
    const isAdmin = roleSelect.value === "admin";
    document.getElementById("adminSection").classList.toggle("hidden", !isAdmin);
    document.getElementById("actionHeader").classList.toggle("hidden", !isAdmin);
    render();
  });

  function saveTransaction() {
    const category = document.getElementById("category").value;
    const amount = document.getElementById("amount").value;
    const type = document.getElementById("type").value;

    if (!category || !amount) return alert("Fill all fields");

    if (editIndex === null) {
      transactions.push({
        date: new Date().toISOString().split("T")[0],
        category,
        amount: Number(amount),
        type
      });
    } else {
      transactions[editIndex].category = category;
      transactions[editIndex].amount = Number(amount);
      transactions[editIndex].type = type;
    }

    resetForm();
    render();
  }

  function editTransaction(index) {
    const t = transactions[index];
    document.getElementById("category").value = t.category;
    document.getElementById("amount").value = t.amount;
    document.getElementById("type").value = t.type;
    document.getElementById("formTitle").innerText = "Edit Transaction";
    editIndex = index;
  }

  function deleteTransaction(index) {
    transactions.splice(index, 1);
    render();
  }

  function resetForm() {
    document.getElementById("category").value = "";
    document.getElementById("amount").value = "";
    document.getElementById("type").value = "income";
    document.getElementById("formTitle").innerText = "Add Transaction";
    editIndex = null;
  }

  function render() {
    const search = document.getElementById("search").value.toLowerCase();
    const filter = document.getElementById("filter").value;
    const isAdmin = roleSelect.value === "admin";

    let filtered = transactions.filter((t) =>
      t.category.toLowerCase().includes(search) &&
      (filter === "all" || t.type === filter)
    );

    const tbody = document.getElementById("tableBody");
    tbody.innerHTML = "";

    let income = 0, expense = 0;

    filtered.forEach((t, index) => {
      if (t.type === "income") income += t.amount;
      else expense += t.amount;

      tbody.innerHTML += `
        <tr>
          <td>${t.date}</td>
          <td>${t.category}</td>
          <td>${t.amount}</td>
          <td>${t.type}</td>
          ${isAdmin ? `
            <td>
              <button onclick="editTransaction(${index})">Edit</button>
              <button class="delete-btn" onclick="deleteTransaction(${index})">Delete</button>
            </td>
          ` : ""}
        </tr>
      `;
    });

    document.getElementById("income").innerText = income;
    document.getElementById("expense").innerText = expense;
    document.getElementById("balance").innerText = income - expense;

    generateInsights(filtered);
  }

  function generateInsights(data) {
    let categoryTotals = {};

    data.forEach(t => {
      if (t.type === "expense") {
        categoryTotals[t.category] = (categoryTotals[t.category] || 0) + t.amount;
      }
    });

    let maxCategory = "";
    let maxValue = 0;

    for (let cat in categoryTotals) {
      if (categoryTotals[cat] > maxValue) {
        maxValue = categoryTotals[cat];
        maxCategory = cat;
      }
    }

    document.getElementById("insightText").innerText =
      maxCategory
        ? `Highest spending is on ${maxCategory} (${maxValue})`
        : "No insights available";
  }

  render();
</script>

</body>
</html>
